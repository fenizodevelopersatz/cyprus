<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Primary SEO -->
    <title>Primerica Exchange — Crypto Trading Platform | Spot, Futures & P2P</title>
    <meta
      name="description"
      content="Trade crypto on Primerica Exchange with deep-liquidity spot, lightning-fast futures, and secure P2P. Advanced charting, low fees, and 24/7 markets—built for pro and beginner traders."
    />
    <meta
      name="keywords"
      content="crypto exchange, bitcoin trading, futures trading, spot trading, P2P crypto, USDT, BTC, ETH, BINANCE style exchange, order book, tradingview charts, Indian crypto exchange"
    />
    <link
      rel="canonical"
      href="https://fenizotechnologies.com/"
    />
    <link
      rel="alternate"
      href="https://fenizotechnologies.com/"
      hreflang="en-IN"
    />
    <meta name="robots" content="index,follow,max-image-preview:large" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="color-scheme" content="dark light" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Primerica Exchange" />
    <meta property="og:title" content="Primerica Exchange — Crypto Trading Platform" />
    <meta
      property="og:description"
      content="Trade spot, futures & P2P with pro-grade tools. Low fees, fast execution, secure custody."
    />
    <meta property="og:url" content="https://fenizotechnologies.com/" />
    <meta
      property="og:image"
      content="https://fenizotechnologies.com/og/og-exchange.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@fenizo" />
    <meta name="twitter:title" content="Primerica Exchange — Crypto Trading Platform" />
    <meta
      name="twitter:description"
      content="Advanced charts, deep liquidity, and fast order matching. Start trading today."
    />

    <!-- Icons / PWA (optional but recommended) -->
    <link rel="icon" href="/favicons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicons/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Primerica Exchange" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Preconnect for performance (adjust to your actual endpoints) -->
    <link rel="preconnect" href="https://api.fenizotechnologies.com" crossorigin />
    <link rel="preconnect" href="https://ws.fenizotechnologies.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.fenizotechnologies.com" />
    <link rel="dns-prefetch" href="https://ws.fenizotechnologies.com" />

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
